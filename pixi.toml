[workspace]
name = "rrivis-notebooks"
version = "0.1.0"
description = "Jupyter notebooks for exploring RRIVis sky models, precision, and beam analysis."
authors = ["Kartik Mandar <kartik4321mandar@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[tasks]
lab = "jupyter lab"

[dependencies]
python = "=3.11"
pip = "*"
numpy = "*"
matplotlib = "*"
scipy = "*"
healpy = "*"
mpmath = "*"
astropy = "*"
astroquery = "*"
jupyterlab = "*"
ipykernel = "*"

[pypi-dependencies]
pygdsm = "*"
pysm3 = "*"
rrivis = { path = "../RRIVis", editable = true }
